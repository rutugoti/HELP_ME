# ─────────────────────────────────────────────────────────────
# LastMinute — Render Blueprint Specification
# Deploys the PostgreSQL database, Redis Key-Value store, and
# all 6 microservices as web services (since private services are paid-only).
# ─────────────────────────────────────────────────────────────

databases:
  - name: lastminute-db
    databaseName: lastminute
    plan: free

envVarGroups:
  - name: lastminute-shared-env
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

services:
  # 1. Redis Cache & Rate Limiter
  - type: keyvalue
    name: lastminute-redis
    plan: free
    ipAllowList: [] # Strict security: restrict external traffic, only allow internal services

  # 2. User Service (Web Microservice)
  - type: web
    name: lastminute-user-service
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    # Free tier does not support pre-deploy commands, so run database migrations as part of startCommand
    startCommand: pnpm --filter @lastminute/database migrate:latest && node services/user-service/dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: lastminute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lastminute-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lastminute-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lastminute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lastminute-db
          property: password
      - fromGroup: lastminute-shared-env

  # 3. Task Service (Web Microservice)
  - type: web
    name: lastminute-task-service
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    startCommand: node services/task-service/dist/index.js
    envVars:
      - key: PORT
        value: 3002
      - key: DB_HOST
        fromDatabase:
          name: lastminute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lastminute-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lastminute-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lastminute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lastminute-db
          property: password
      - fromGroup: lastminute-shared-env

  # 4. Calendar Service (Web Microservice)
  - type: web
    name: lastminute-calendar-service
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    startCommand: node services/calendar-service/dist/index.js
    envVars:
      - key: PORT
        value: 3003
      - key: DB_HOST
        fromDatabase:
          name: lastminute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lastminute-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lastminute-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lastminute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lastminute-db
          property: password
      - fromGroup: lastminute-shared-env

  # 5. AI Service (Web Microservice)
  - type: web
    name: lastminute-ai-service
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    startCommand: node services/ai-service/dist/index.js
    envVars:
      - key: PORT
        value: 3004
      - key: RABBITMQ_URL
        value: "" # Provide your CloudAMQP/RabbitMQ connection URL if messaging queue is configured
      - key: DB_HOST
        fromDatabase:
          name: lastminute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lastminute-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lastminute-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lastminute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lastminute-db
          property: password
      - fromGroup: lastminute-shared-env

  # 6. Notification Service (Web Microservice)
  - type: web
    name: lastminute-notification-service
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    startCommand: node services/notification-service/dist/index.js
    envVars:
      - key: PORT
        value: 3005
      - key: DB_HOST
        fromDatabase:
          name: lastminute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lastminute-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lastminute-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lastminute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lastminute-db
          property: password
      - fromGroup: lastminute-shared-env

  # 7. API Gateway (Public Web Service)
  - type: web
    name: lastminute-api-gateway
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile --production=false && pnpm run build
    startCommand: node services/api-gateway/dist/index.js
    envVars:
      - key: PORT
        value: 3000
      - key: USER_SERVICE_URL
        value: http://lastminute-user-service:3001
      - key: TASK_SERVICE_URL
        value: http://lastminute-task-service:3002
      - key: CALENDAR_SERVICE_URL
        value: http://lastminute-calendar-service:3003
      - key: AI_SERVICE_URL
        value: http://lastminute-ai-service:3004
      - key: NOTIFICATION_SERVICE_URL
        value: http://lastminute-notification-service:3005
      - key: REDIS_URL
        fromService:
          name: lastminute-redis
          type: keyvalue
          property: connectionString
      - fromGroup: lastminute-shared-env
